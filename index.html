<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitHub Pages — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap%22 rel="stylesheet" />
<style>

    :root {

      --bg: #0a0a0a;

      --fg: #f0ede6;

      --accent: #c8f135;

      --muted: #444;

      --border: #222;

    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {

      background: var(--bg);

      color: var(--fg);

      font-family: 'Space Mono', monospace;

      min-height: 100vh;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: center;

      overflow: hidden;

      position: relative;

    }
 
    body::before {

      content: '';

      position: fixed;

      inset: 0;

      background-image:

        linear-gradient(var(--border) 1px, transparent 1px),

        linear-gradient(90deg, var(--border) 1px, transparent 1px);

      background-size: 48px 48px;

      opacity: 0.5;

      pointer-events: none;

    }
 
    .card {

      position: relative;

      z-index: 1;

      border: 1px solid var(--muted);

      padding: 3rem 4rem;

      max-width: 640px;

      width: calc(100% - 3rem);

      text-align: center;

      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;

    }
 
    .card::before {

      content: '';

      position: absolute;

      inset: -1px;

      background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);

      opacity: 0.15;

      pointer-events: none;

    }
 
    .badge {

      display: inline-flex;

      align-items: center;

      gap: 0.5rem;

      font-size: 0.7rem;

      letter-spacing: 0.15em;

      text-transform: uppercase;

      color: var(--accent);

      margin-bottom: 2rem;

      border: 1px solid var(--accent);

      padding: 0.35rem 0.9rem;

    }
 
    .dot {

      width: 6px;

      height: 6px;

      background: var(--accent);

      border-radius: 50%;

      animation: pulse 1.4s ease-in-out infinite;

    }
 
    h1 {

      font-family: 'Syne', sans-serif;

      font-size: clamp(2.2rem, 6vw, 3.5rem);

      font-weight: 800;

      line-height: 1.05;

      letter-spacing: -0.02em;

      margin-bottom: 1.25rem;

    }
 
    h1 span { color: var(--accent); }
 
    p {

      font-size: 0.8rem;

      line-height: 1.8;

      color: #888;

      margin-bottom: 2.5rem;

    }
 
    .meta {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 1px;

      background: var(--border);

      border: 1px solid var(--border);

      margin-bottom: 2.5rem;

      text-align: left;

    }
 
    .meta-item {

      background: var(--bg);

      padding: 0.9rem 1.2rem;

    }
 
    .meta-label {

      font-size: 0.65rem;

      letter-spacing: 0.12em;

      text-transform: uppercase;

      color: #555;

      margin-bottom: 0.3rem;

    }
 
    .meta-value { font-size: 0.8rem; color: var(--fg); }

    .meta-value.ok { color: var(--accent); }
 
    .footer {

      font-size: 0.65rem;

      letter-spacing: 0.08em;

      color: var(--muted);

      text-transform: uppercase;

    }
 
    @keyframes fadeUp {

      from { opacity: 0; transform: translateY(24px); }

      to   { opacity: 1; transform: translateY(0); }

    }
 
    @keyframes pulse {

      0%, 100% { opacity: 1; transform: scale(1); }

      50%       { opacity: 0.4; transform: scale(0.7); }

    }
</style>
</head>
<body>
<div class="card">
<div class="badge"><span class="dot"></span> Deployment active</div>
<h1>GitHub Pages<br /><span>is working.</span></h1>
<p>

      This page was served successfully via GitHub Pages.<br />

      Your static site pipeline is configured correctly.
</p>
<div class="meta">
<div class="meta-item">
<div class="meta-label">Status</div>
<div class="meta-value ok">✓ Online</div>
</div>
<div class="meta-item">
<div class="meta-label">Source</div>
<div class="meta-value">GitHub Pages</div>
</div>
<div class="meta-item">
<div class="meta-label">Protocol</div>
<div class="meta-value" id="protocol">—</div>
</div>
<div class="meta-item">
<div class="meta-label">Loaded at</div>
<div class="meta-value" id="timestamp">—</div>
</div>
</div>
<div class="footer">index.html · static · no framework</div>
</div>
 
  <script>

    document.getElementById('protocol').textContent = location.protocol.replace(':', '').toUpperCase();

    document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
</script>
</body>
</html>
